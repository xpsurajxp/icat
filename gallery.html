<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | iCat Compuer Academy</title>
  <meta name="description" content="Gallery of iCat Compuer Academy training environment and activities." />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/main.js" defer></script>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="page-banner">
      <div class="container">
        <h1>Gallery</h1>
        <p>Snapshots of classroom practice, creativity and student progress.</p>
      </div>
    </section>

    <section class="section">
      <div class="container split-heading">
        <div>
          <p class="eyebrow">Campus Moments</p>
          <h2 class="icon-title">
            <span class="icon-badge icon-pop" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="4" y="7" width="16" height="11" rx="2"></rect>
                <path d="m9 11 2.2 2.2"></path>
                <path d="m15 11-3.8 3.8"></path>
                <circle cx="16.8" cy="9.2" r="1"></circle>
              </svg>
            </span>
            <span>Learning in Action</span>
          </h2>
        </div>
        <p class="split-copy">
          Explore a visual glimpse of practical sessions, course activities and
          student-centered training environment at iCat Compuer Academy.
        </p>
      </div>

      <div class="container">
        <div class="gallery-grid gallery-mosaic" id="galleryGrid">
          <img class="gallery-item wide" src="https://picsum.photos/seed/icat1/900/620" alt="Computer lab session" />
          <img class="gallery-item tall" src="https://picsum.photos/seed/icat2/620/900" alt="Students in practical training" />
          <img class="gallery-item" src="https://picsum.photos/seed/icat3/620/420" alt="Instructor teaching in class" />
          <img class="gallery-item" src="https://picsum.photos/seed/icat4/620/420" alt="Skill development workshop" />
          <img class="gallery-item tall" src="https://picsum.photos/seed/icat5/620/900" alt="Digital learning setup" />
          <img class="gallery-item wide" src="https://picsum.photos/seed/icat6/900/620" alt="Course guidance session" />
          <img class="gallery-item" src="https://picsum.photos/seed/icat7/620/420" alt="Hands-on project activity" />
          <img class="gallery-item" src="https://picsum.photos/seed/icat8/620/420" alt="Computer education classroom" />
          <img class="gallery-item wide" src="https://picsum.photos/seed/icat9/900/620" alt="Student assignment work" />
        </div>
      </div>
    </section>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox-close" id="lightboxClose" aria-label="Close image preview">&times;</button>
      <img id="lightboxImage" src="" alt="Preview" />
    </div>
  </main>

  <div id="site-footer"></div>
</body>
</html>
