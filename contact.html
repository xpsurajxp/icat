<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <div id="site-header"></div>

  <main>
    <section class="page-banner">
      <div class="container">
        <h1>Contact Us</h1>
        <p>Speak with us for course counselling, details and admission help.</p>
      </div>
    </section>

    <section class="section">
      <div class="container contact-layout">
        <article class="contact-card contact-primary">
          <p class="eyebrow">Get in Touch</p>
          <h2 class="icon-title">
            <span class="icon-badge icon-float" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                <path d="M8 8h8"></path>
                <path d="M8 12h8"></path>
                <path d="M8 16h5"></path>

            </span>
            <span>iCat Compuer Academy</span>
          </h2>

          <div class="contact-line">
            <h3 class="icon-title">
              <span class="icon-badge icon-float" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 21s-6-5.2-6-10a6 6 0 1 1 12 0c0 4.8-6 10-6 10Z"></path>
                  <circle cx="12" cy="11" r="2.2"></circle>
                </svg>
              </span>
              <span>Address</span>
            </h3>
            <p>Hyderganj Market, Ayodhya</p>
          </div>

          <div class="contact-line">
            <h3 class="icon-title">
              <span class="icon-badge icon-soft-pulse" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <rect x="8" y="3" width="8" height="18" rx="2"></rect>
                  <path d="M11 6h2"></path>
                  <circle cx="12" cy="18" r="0.8"></circle>
                </svg>
              </span>
              <span>Mobile</span>
            </h3>
            <p><a href="https://wa.me/918808800266" target="_blank" rel="noopener noreferrer">WhatsApp: 8808800266</a></p>
            <p><a href="tel:8808807636">Call: 8808807636</a></p>
          </div>

          <div class="contact-line">
            <h3 class="icon-title">
              <span class="icon-badge icon-pop" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <rect x="3" y="6" width="18" height="12" rx="2"></rect>
                  <path d="m4 8 8 6 8-6"></path>
                </svg>
              </span>
              <span>Email</span>
            </h3>
            <p><a href="mailto:academyicat@gmail.com">academyicat@gmail.com</a></p>
          </div>

          <div class="contact-actions">
            <a class="btn btn-primary" href="tel:8808807636">Call Now</a>
            <a class="btn btn-secondary-outline" href="admission.html">Admission Enquiry</a>
          </div>
        </article>

        <article class="contact-card map-card">
          <h2 class="icon-title">
            <span class="icon-badge icon-spin" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M3 7 9 4l6 3 6-3v13l-6 3-6-3-6 3Z"></path>
                <path d="M9 4v13"></path>
                <path d="M15 7v13"></path>
              </svg>
            </span>
            <span>Find Us on Map</span>
          </h2>
          <div class="map-wrap">
            <iframe
              title="Hyderganj Market, Ayodhya"
              src="https://www.google.com/maps?q=Hyderganj+Market,+Ayodhya&output=embed"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              allowfullscreen>

      </div>

  <div id="site-footer"></div>
